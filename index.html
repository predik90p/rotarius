<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotarius - Swiss Excellence</title>
<link rel="stylesheet" href="style.css">
<!-- Используем Outfit и Inter для современного вида -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="nav-wrapper">
                <!-- Секция логотипа -->
                <div class="logo-section">
                    <img src="../logo1.png" alt="Rotarius" class="logo-img">
                    <span class="logo-text">Rotarius</span>
                </div>
                
                <div class="divider"></div>
                
                <!-- Навигация -->
                <nav class="main-nav">
                    <ul>
                        <li class="active"><a href="#">Главная <i class="fas fa-chevron-down"></i></a></li>
                        <li><a href="#">О компании <i class="fas fa-chevron-down"></i></a></li>
                        <li><a href="#">Услуги <i class="fas fa-chevron-down"></i></a></li>
                        <li><a href="#">Производство <i class="fas fa-chevron-down"></i></a></li>
                        <li><a href="#">Новости <i class="fas fa-chevron-down"></i></a></li>
                        <li><a href="#">Контакты</a></li>
                    </ul>
                </nav>
                
                <!-- Правая часть: поиск, корзина и CTA -->
                <div class="nav-actions">
                    <a href="#" class="action-icon"><i class="fas fa-shopping-basket"></i></a>
                    <a href="#" class="action-icon"><i class="fas fa-search"></i></a>
                    <a href="#" class="btn-cta">Связаться с нами</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Будущее беспилотных систем</h1>
                <p>Швейцарская точность и передовые технологии для самых ответственных задач.</p>
                <div class="hero-btns">
                    <a href="#" class="btn-primary">Наши решения</a>
                    <a href="#" class="btn-secondary">О холдинге</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
